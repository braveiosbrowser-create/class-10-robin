<!DOCTYPE html>
<html>
<head>
    <title>Class 10 Subjects</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background: #0057d8;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #0057d8;
            border-left: 5px solid #0057d8;
            padding-left: 10px;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            padding: 12px;
            background: #eef3ff;
            margin: 8px 0;
            border-radius: 6px;
        }

        li a {
            font-size: 20px;
            text-decoration: none;
            color: #0057d8;
        }

        li:hover {
            background: #d9e4ff;
        }

        /* Contact Form */
        #contact-box {
            margin-top: 40px;
            padding: 25px;
            background: #f0f5ff;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #aaa;
        }

        button {
            padding: 12px 22px;
            background: #0057d8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #003f9e;
        }

        footer {
            margin-top: 30px;
            padding: 15px;
            text-align: center;
            background: #0057d8;
            color: white;
        }
    </style>
</head>

<body>

<header>
    Class 10 Study Hub
</header>

<div class="container">

    <h2>Select Your Subject</h2>

    <ul>
        <li><a href="physics.html">Physics</a></li>
        <li><a href="chemistry.html">Chemistry</a></li>
        <li><a href="mathematics.html">Mathematics</a></li>
    </ul>

    <!-- CONTACT FORM -->
    <div id="contact-box">
        <h2>Contact Us</h2>
        <p>Submit your details and we will reach out.</p>

        <form action="https://formsubmit.co/ninjasirclasses@gmail.com" method="POST">

            <!-- Prevent spam -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New Student Inquiry">
            <input type="hidden" name="_template" value="table">

            <label>Your Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="Enter your phone number" required>

            <button type="submit">Submit</button>
        </form>
    </div>

</div>

<footer>
    © 2024 Ninja Sir Classes — All Rights Reserved
</footer>

</body>
</html>
